root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/mailrelay"
full_bin = "./tmp/mailrelay -config config.dev.yaml"
cmd = "go build -o ./tmp/mailrelay ./cmd/mailrelay"
delay = 500
exclude_dir = ["tmp", "bin", "vendor", ".git"]
exclude_regex = ["_test\\.go$"]
include_ext = ["go", "html", "yaml", "toml", "json"]
kill_delay = "1s"
send_interrupt = true
stop_on_error = true

[log]
time = false

[misc]
clean_on_exit = true
